services:
  - type: web
    name: apuesta-mundial-api
    runtime: node
    rootDir: services/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PAYPHONE_API_BASE_URL
        value: https://pay.payphonetodoesposible.com/api
      - key: PAYPHONE_COUNTRY_CODE
        value: "593"
      - key: PAYPHONE_STORE_ID
        sync: false
      - key: PAYPHONE_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: Soporte
      - key: PASSWORD_RESET_CODE_TTL_MINUTES
        value: "15"
      - key: PASSWORD_RESET_MAX_ATTEMPTS
        value: "5"
